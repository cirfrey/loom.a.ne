name: CI

on: [push]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini', 'dependencies.lock') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build (native)
        run: pio run -e native

      - name: Unit tests
        run: .pio/build/native/program test.unit=on test.after_unit=halt
