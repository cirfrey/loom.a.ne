[common]
version_major = 0
version_minor = 7

test_sources     = <lm/**/*.test.*>
unit_test_runner = <lm/test/unit.cpp>

[env]
board_build.partitions = include/lm/board/${this.board}/lm/partitions.csv
board_build.filesystem = fatfs

build_src_filter =
    +<lm/> -<lm/arch/>
    -${common.test_sources} -${common.unit_test_runner}
    +<../thirdparty/tinyusb/src> -<../thirdparty/tinyusb/src/portable/>

monitor_speed = 115200
monitor_raw = yes

build_flags =
    -Wall
    -Werror
    -Wextra
    -Wpedantic
    # -Wunused
    -isystemthirdparty/tinyusb/src # Treats tinyusb as system header (no warnings)
    -I$BUILD_DIR/generated/include
    -std=c++20

extra_scripts =
    pre:scripts/pio/common.py # Loads stuff common across all scripts.
    pre:scripts/pio/generate_build_files.py # Generate some files required for building (lm/build.hpp, loomane_defs.cmake, banner_defs.ini, etc).
    pre:scripts/pio/configure_tinyusb.py
    pre:scripts/pio/extra_targets.py # Add the upload_assets target.

[env:banner]
platform = native
board    = native
# TODO: make the banner env use lm::ini::parse()
build_src_filter = -<*> +<lm/banner.cpp> +<lm/arch/x86_64/main/banner.cpp>

[env:native]
platform = native
board    = native
extra_scripts =
    ${env.extra_scripts}
    pre:scripts/pio/add_winlibs.py
build_src_filter =
    ${env.build_src_filter}
    +<lm/arch/x86_64>
    -<lm/arch/x86_64/main> +<lm/arch/x86_64/main/loomane.cpp>
    +${common.test_sources} +${common.unit_test_runner}

[env:lolin_s2_mini]
platform  = espressif32
framework = espidf
board           = lolin_s2_mini
board_build.mcu = esp32s2 # For some reason this doesn't seem to be set correctly.

[env:seeed_xiao_esp32s3]
platform  = espressif32
framework = espidf
board           = seeed_xiao_esp32s3
board_build.mcu = esp32s3 # For some reason this doesn't seem to be set correctly.
